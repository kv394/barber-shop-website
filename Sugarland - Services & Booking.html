hite);\n      color: var(--black);\n      padding: 15px 0;\n      position: sticky;\n      top: 0;\n      z-index: 1000;\n      border-bottom: 2px solid var(--primary);\n      box-shadow: 0 4px 6px rgba(0,0,0,0.1);\n    }\n    .nav-container {\n      max-width: 1200px;\n      margin: 0 auto;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      padding: 0 20px;\n      flex-wrap: wrap;\n    }\n    .nav-brand {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      text-decoration: none;\n    }\n    .nav-logo {\n      width: 40px;\n      height: 40px;\n      color: var(--primary);\n    }\n    .nav-links {\n      display: flex;\n      gap: 20px;\n      align-items: center;\n      flex-wrap: wrap;\n      justify-content: center;\n      padding-right: 80px;\n    }\n    .navbar a {\n      color: var(--black);\n      text-decoration: none;\n      font-size: 1rem;\n      font-weight: 700;\n      text-transform: uppercase;\n      transition: color 0.3s;\n      padding: 5px 10px;\n    }\n    .navbar a:hover, .navbar a.active {\n      color: var(--primary);\n    }\n    .nav-cta {\n      background: var(--primary);\n      color: var(--white) !important;\n      padding: 10px 20px !important;\n      border-radius: 4px;\n      border: 2px solid var(--primary);\n    }\n    .nav-cta:hover {\n      background: var(--white);\n      color: var(--primary) !important;\n    }\n\n    /* Hero / About */\n    .hero-section {\n      text-align: center;\n      padding: 100px 20px;\n      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format\u0026fit=crop\u0026w=2000\u0026q=80') center/cover;\n      color: var(--white);\n    }\n    .hero-section h1 {\n      font-size: clamp(3rem, 8vw, 5rem);\n      margin: 0 0 10px 0;\n      color: var(--white);\n      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);\n    }\n    .hero-section p {\n      font-size: 1.5rem;\n      max-width: 800px;\n      margin: 0 auto 30px;\n      font-weight: 700;\n      text-transform: uppercase;\n    }\n    \n    /* Containers */\n    .container {\n      max-width: 1200px;\n      margin: 60px auto;\n      padding: 0 20px;\n    }\n    .section-header {\n      font-size: 3rem;\n      color: var(--black);\n      margin-bottom: 20px;\n      position: relative;\n      display: inline-block;\n      text-transform: uppercase;\n      font-weight: 900;\n    }\n    .section-header::after {\n      content: '';\n      position: absolute;\n      bottom: -10px;\n      left: 50%;\n      transform: translateX(-50%);\n      width: 60px;\n      height: 4px;\n      background: var(--primary);\n    }\n    .section-header-wrap {\n      text-align: center;\n      margin-bottom: 50px;\n    }\n\n    /* Grid Layout */\n    .grid {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n      gap: 16px;\n    }\n\n    /* Cards */\n    .card {\n      background: var(--light-gray);\n      border-top: 4px solid var(--primary);\n      padding: 18px 14px 14px 14px;\n      text-align: center;\n      transition: transform 0.3s, box-shadow 0.3s;\n      width: 100%;\n      min-width: 0;\n      min-height: 270px;\n      max-width: 340px;\n      height: 100%;\n      box-sizing: border-box;\n      display: flex;\n      flex-direction: column;\n      justify-content: flex-start;\n      align-items: stretch;\n      margin: 0 auto;\n    }\n    .card:hover {\n      transform: translateY(-5px);\n      box-shadow: 0 10px 20px rgba(0,0,0,0.1);\n    }\n    .card-title {\n      font-size: 1.15rem;\n      color: var(--black);\n      margin: 0 0 15px 0;\n      text-transform: uppercase;\n      font-weight: 900;\n    }\n    .card-price {\n      font-size: 1.1rem;\n      font-weight: 900;\n      color: var(--primary);\n      margin-bottom: 15px;\n    }\n    .card-desc {\n      font-size: 0.85rem;\n      margin-bottom: 12px;\n      color: var(--text-main);\n      display: -webkit-box;\n      -webkit-line-clamp: 3;\n      -webkit-box-orient: vertical;\n      overflow: hidden;\n      min-height: 3.8em;\n      max-height: 4.2em;\n    }\n\n    .card-actions {\n      display: flex;\n      gap: 10px;\n      width: 100%;\n      margin-top: auto;\n      justify-content: center;\n      align-items: stretch;\n    }\n\n    .card-actions .btn {\n      flex: 1;\n      min-width: 0;\n      width: 100%;\n      max-width: none;\n      margin: 0;\n      padding: 14px 0;\n    }\n\n    .card-actions .btn-outline {\n      background: transparent;\n      color: var(--black);\n      border-color: var(--black);\n      box-shadow: 0 2px 8px rgba(0,0,0,0.04);\n    }\n\n    /* Buttons */\n    .btn {\n      display: inline-block;\n      background: var(--primary);\n      color: var(--white);\n      border: 2px solid var(--primary);\n      padding: 16px 0;\n      font-family: 'Roboto', sans-serif;\n      font-size: 1.08rem;\n      font-weight: 800;\n      text-transform: uppercase;\n      cursor: pointer;\n      transition: all 0.3s;\n      border-radius: 6px;\n      width: 96%;\n      max-width: 260px;\n      letter-spacing: 0.5px;\n      box-shadow: 0 2px 8px rgba(0,0,0,0.07);\n      margin-top: auto;\n      margin-bottom: 0;\n      align-self: center;\n    }\n\n    /* Make the Check In button larger and more prominent */\n    .b-book.btn {\n      padding: 14px 0;\n      font-size: 1.05rem;\n      font-weight: 800;\n      border-radius: 24px;\n      max-width: 220px;\n      box-shadow: 0 2px 8px rgba(227,24,55,0.10);\n      letter-spacing: 0.5px;\n      margin-top: auto;\n      margin-bottom: 0;\n      background: linear-gradient(90deg, var(--primary) 60%, #ff5a5f 100%);\n      border: none;\n      color: #fff;\n      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;\n      text-shadow: 0 1px 2px rgba(0,0,0,0.07);\n    }\n    .b-book.btn:hover {\n      background: linear-gradient(90deg, #ff5a5f 0%, var(--primary) 100%);\n      box-shadow: 0 4px 16px rgba(227,24,55,0.18);\n      transform: translateY(-2px) scale(1.03);\n    }\n    .btn:hover {\n      background: var(--black);\n      border-color: var(--black);\n      color: var(--white);\n    }\n    .btn-outline {\n      background: transparent;\n      color: var(--black);\n      border-color: var(--black);\n      font-weight: 800;\n      padding: 16px 0;\n      border-radius: 6px;\n      width: 96%;\n      max-width: 260px;\n      letter-spacing: 0.5px;\n      box-shadow: 0 2px 8px rgba(0,0,0,0.04);\n    }\n    .btn.b-view, .btn-outline.b-view {\n      font-size: 1.22rem !important;\n    }\n    .btn-outline:hover {\n      background: var(--black);\n      color: var(--white);\n    }\n\n    /* Testimonials */\n    .testimonial {\n      background: var(--white);\n      border: 1px solid #ddd;\n      padding: 30px;\n      position: relative;\n    }\n    .testimonial::before {\n      content: '\"';\n      position: absolute;\n      top: 10px;\n      left: 20px;\n      font-size: 4rem;\n      color: var(--light-gray);\n      font-family: Georgia, serif;\n      line-height: 1;\n    }\n    .testimonial-stars {\n      color: var(--primary);\n      font-size: 1.5rem;\n      margin-bottom: 15px;\n    }\n    .testimonial-quote {\n      font-size: 1.1rem;\n      font-style: italic;\n      position: relative;\n      z-index: 1;\n    }\n\n    .loading {\n      text-align: center;\n      font-size: 1.5rem;\n      padding: 50px 0;\n      font-weight: 900;\n      text-transform: uppercase;\n      color: var(--primary);\n      animation: pulse 1s infinite alternate;\n    }\n    @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }\n\n    @media (max-width: 768px) {\n      .nav-container { flex-direction: column; gap: 15px; }\n      .hero-section { padding: 60px 20px; }\n      .section-header { font-size: 2.2rem; }\n    }\n  \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n\n  \u003cnav class=\"navbar\"\u003e\n    \u003cdiv class=\"nav-container\ \u003cdiv id=\"services-loading\" class=\"loading\"\u003eLoading Playbook...\u003c/div\u003e\n    \u003cdiv id=\"services-content\" style=\"display: none;\"\u003e\n      \u003cdiv class=\"section-header-wrap\"\u003e\n        \u003ch2 class=\"section-header\"\u003eHaircuts \u0026 Services\u003c/h2\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"grid\" id=\"services-list\"\u003e\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/article\u003e\n\n  \u003carticle id=\"shop\" class=\"container\" style=\"background-color: var(--light-gray); padding-top: 60px; padding-bottom: 60px; max-width: 100%;\"\u003e\n    \u003cdiv style=\"max-width: 1200px; margin: 0 auto;\"\u003e\n      \u003cdiv id=\"products-loading\" class=\"loading\"\u003eLoading Gear...\u003c/div\u003e\n      \u003cdiv id=\"products-content\" style=\"display: none;\"\u003e\n        \u003cdiv class=\"section-header-wrap\"\u003e\n          \u003ch2 class=\"section-header\"\u003ePro Gear\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"grid\" id=\"products-list\"\u003e\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/article\u003e\n\n  \u003carticle id=\"reviews\" class=\"container\" style=\"margin-bottom: 100px;\"\u003e\n    \u003cdiv id=\"reviews-loading\" class=\"loading\"\u003eLoading Highlights...\u003c/div\u003e\n    \u003cdiv id=\"reviews-content\" style=\"display: none;\"\u003e\n      \u003cdiv class=\"section-header-wrap\"\u003e\n        \u003ch2 class=\"section-header\"\u003eFan Highlights\u003c/h2\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"grid\" id=\"reviews-list\"\u003e\u003c/div\u003e\n      \u003cdiv style=\"text-align: center; margin-top: 50px;\"\u003e\n        \u003cbutton class=\"btn btn-outline\" id=\"add-review-btn\" style=\"max-width: 300px;\"\u003eSubmit Highlight\u003c/button\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/article\u003e\n\n  \u003c!-- Core SDK --\u003e\n  \u003cscript\u003e\n    (function() {\n      let domain = window.location.origin;\n      let isFileProtocol = window.location.protocol === \"file:\";\n      if (domain === \"null\" || domain === \"about://\" || window.location.protocol === \"about:\" || isFileProtocol) {\n        try { domain = window.parent.location.origin; } catch(e) {}\n      }\n      if (domain === \"null\" || domain === \"about://\" || !domain) {\n        domain = \"https://barbersaas-henna.vercel.app\";\n      }\n      \n      const sdkScript = document.createElement(\"script\");\n      sdkScript.src = isFileProtocol \u0026\u0026 domain === \"file://\" ? \"../barbersaas-sdk.js?v=4\" : domain + \"/barbersaas-sdk.js?v=4\";\n      document.head.appendChild(sdkScript);\n    })();\n  \u003c/script\u003e\n  \u003cscript\u003e\n    // Smooth scrolling nav\n    document.querySelectorAll('.nav-link:not(.nav-cta)').forEach(link =\u003e {\n      link.addEventListener('click', function(e) {\n        e.preventDefault();\n        document.querySelectorAll('.nav-link').forEach(a =\u003e a.classList.remove('active'));\n        this.classList.add('active');\n        \n        const targetId = this.getAttribute('href');\n        const targetElement = document.querySelector(targetId);\n        if (targetElement) {\n          const headerOffset = document.querySelector('.navbar').offsetHeight;\n          const elementPosition = targetElement.getBoundingClientRect().top;\n          window.scrollTo({ top: elementPosition + window.scrollY - headerOffset, behavior: \"smooth\" });\n        }\n      });\n    });\n\n    window.addEventListener(\"load\", function () {\n      function initializeShop() {\n        if (typeof BarberSaaS === \"undefined\") return;\n        \n        const urlParams = new URLSearchParams(window.location.search);\n        let shopId = urlParams.get(\"shopId\");\n        if (!shopId) {\n            try {\n                const parentParams = new URLSearchParams(window.parent.location.search);\n                shopId = parentParams.get(\"shopId\");\n            } catch(e) {}\n        }\n        if (!shopId) {\n            try {\n                const paths = window.parent.location.pathname.split('/');\n                shopId = paths[paths.length - 1];\n            } catch(e) {}\n        }\n        shopId = shopId || \"cmn9kj24n0000lqzc7kcsmpst\";\n        \n        let domain = window.location.origin;\n        let isFileProtocol = window.location.protocol === \"file:\";\n        \n        if (domain === \"null\" || domain === \"about://\" || window.location.protocol === \"about:\" || isFileProtocol) {\n          try { domain = window.parent.location.origin; } catch(e) {}\n        }\n        if (domain === \"null\" || domain === \"about://\" || domain === \"file://\" || !domain) {\n          domain = \"https://barbersaas-henna.vercel.app\";\n        }\n        \n        const apiUrlToUse = (domain.includes(\"localhost\") || domain.includes(\"127.0.0.1\")) \u0026\u0026 !isFileProtocol ? domain : \"https://barbersaas-henna.vercel.app\";\n\n        // Initialize SDK without hardcoded colors so it can fetch the shop data\n        BarberSaaS.init(shopId, { \n            position: \"bottom-right\",\n            apiUrl: apiUrlToUse\n        });\n\n        BarberSaaS.getPublicData().then((data) =\u003e {\n          try {\n            const shop = data.shop || {};\n            \n            // 1. Extract dynamic theme colors set by THIS specific shop's admin\n            const primaryColor = shop.primaryColor || \"#E31837\"; // fallback to Sport Clips Red (primary/accent for widgets)\n            const secondaryColor = shop.secondaryColor || \"#000000\"; // fallback to black\n            \n            // 2. Set them on the SDK so widgets can read them\n            window.BarberSaaS.primaryColor = primaryColor;\n            window.BarberSaaS.secondaryColor = secondaryColor;\n            \n            // 3. Inject CSS Variables onto the page so user profile avatars inherit them\n            document.documentElement.style.setProperty('--primary', primaryColor, 'important');\n            document.documentElement.style.setProperty('--primary-color', primaryColor, 'important');\n            document.documentElement.style.setProperty('--theme-color', primaryColor, 'important');\n            document.documentElement.style.setProperty('--brand-color', primaryColor, 'important');\n            if (document.body) {\n               document.body.style.setProperty('--primary', primaryColor, 'important');\n               document.body.style.setProperty('--primary-color', primaryColor, 'important');\n               document.body.style.setProperty('--theme-color', primaryColor, 'important');\n               document.body.style.setProperty('--brand-color', primaryColor, 'important');\n            }\n            \n            const styleEl = document.createElement('style');\n            styleEl.innerHTML = `\n              :root {\n                --primary: ${primaryColor} !important;\n                --brand-color: ${primaryColor} !important;\n                --theme-color: ${primaryColor} !important;\n                --widget-border: ${primaryColor} !important;\n              }\n              .supabase-auth-ui_ui-button, .supabase-account-avatar, [id*=\"supabase-\"], [class*=\"supabase-\"], [class*=\"avatar\"], [id*=\"avatar\"], [class*=\"user-profile\"], [class*=\"profile-badge\"], a[href*=\"/sign-in\"], .text-crm-primary {\n                 color: ${primaryColor} !important;\n                 border-color: ${primaryColor} !important;\n                 outline-color: ${primaryColor} !important;\n              }\n              [class*=\"avatar\"] svg, [class*=\"user-profile\"] svg, [class*=\"chat-button\"], #widget-button, .bg-crm-primary {\n                 fill: ${primaryColor} !important;\n                 background-color: ${primaryColor} !important;\n              }\n              #widget-button svg {\n                 fill: #ffffff !important;\n              }\n            `;\n            document.body.appendChild(styleEl);\n\n            // 4. Inject the Chatbot and Booking widgets dynamically NOW that colors are set\n            setTimeout(() =\u003e {\n                let domain = window.location.origin;\n                let isFileProtocol = window.location.protocol === \"file:\";\n                if (domain === \"null\" || domain === \"about://\" || window.location.protocol === \"about:\" || isFileProtocol) {\n                  try { domain = window.parent.location.origin; } catch(e) {}\n                }\n                if (domain === \"null\" || domain === \"about://\" || !domain) {\n                  domain = \"https://barbersaas-henna.vercel.app\";\n                }\n                \n                const cacheBuster = \"?v=\" + new Date().getTime();\n                const widgetUrlPrefix = (isFileProtocol \u0026\u0026 domain === \"file://\") ? \"..\" : domain;\n                \n                const modalScript = document.createElement(\"script\");\n                modalScript.src = widgetUrlPrefix + \"/booking-modal.js\" + cacheBuster;\n                modalScript.setAttribute(\"data-shop-id\", shopId);\n                modalScript.setAttribute(\"data-theme-color\", primaryColor);\n                modalScript.setAttribute(\"data-secondary-color\", primaryColor);\n                document.body.appendChild(modalScript);\n                \n                const widgetScript = document.createElement(\"script\");\n                widgetScript.src = widgetUrlPrefix + \"/booking-widget.js\" + cacheBuster;\n                widgetScript.setAttribute(\"data-shop-id\", shopId);\n                widgetScript.setAttribute(\"data-theme-color\", primaryColor);\n                widgetScript.setAttribute(\"data-secondary-color\", primaryColor);\n                document.body.appendChild(widgetScript);\n            }, 50);\n\n          } catch(e) { console.error(e); }\n\n          // About\n          try {\n            document.getElementById('dyn-s
