<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heritage Haircuts - Carte Blanche Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAFA;
      --text-dark: #1A1A1A;
      --text-light: #666666;
      --accent: #D4AF37; /* Soft gold */
    }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      overflow-x: hidden;
      font-size: 14px;
    }

    h1, h2, h3, .serif {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
    }

    /* Minimal Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(250, 250, 250, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-dark);
    }
    .nav-logo {
      width: 32px;
      height: 32px;
    }
    .nav-brand span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      gap: 30px;
      padding-right: 60px; /* Prevent overlap with user profile widget */
    }
    .nav-links a {
      color: var(--text-dark);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -4px;
      left: 0;
      background-color: var(--text-dark);
      transition: width 0.3s ease;
    }
    .nav-links a:hover::after, .nav-links a.active::after {
      width: 100%;
    }

    /* Hero / Cover */
    .hero {
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4); /* Dark overlay to make text pop */
    }
    .hero-content {
      position: relative;
      z-index: 1;
      color: white;
      max-width: 600px;
      padding: 0 20px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin: 0;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .hero p {
      font-size: 1rem;
      letter-spacing: 1px;
      margin-top: 15px;
      font-weight: 300;
    }

    /* Split Section Layout (Image + Text) */
    .split-section {
      display: flex;
      flex-wrap: wrap;
      min-height: 60vh;
    }
    .split-section.reverse {
      flex-direction: row-reverse;
    }
    .split-image {
      flex: 1 1 50%;
      min-height: 400px;
      background-size: cover;
      background-position: center;
    }
    .split-content {
      flex: 1 1 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6% 6%;
      box-sizing: border-box;
      background: var(--bg);
    }
    
    .section-tag {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 15px;
    }
    .section-heading {
      font-size: clamp(2rem, 3vw, 2.5rem);
      margin: 0 0 25px 0;
      line-height: 1.2;
      color: var(--text-dark);
    }

    /* List Layout (Replacing Cards) */
    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
    }
    .item-row {
      display: flex;
      flex-direction: column;
      padding: 15px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .item-row:last-child {
      border-bottom: none;
    }
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .item-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      margin: 0;
      color: var(--text-dark);
      font-weight: 600;
    }
    .item-price {
      font-size: 0.9rem;
      color: var(--text-dark);
      font-weight: 500;
    }
    .item-desc {
      color: var(--text-light);
      font-size: 0.85rem;
      margin: 0 0 10px 0;
      max-width: 95%;
      line-height: 1.4;
    }
    
    /* Buttons */
    .btn-solid {
      background: var(--text-dark);
      color: white;
      border: none;
      padding: 12px 25px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
      align-self: flex-start;
    }
    .btn-solid:hover {
      background: #333;
    }
    .btn-text {
      background: none;
      border: none;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--text-dark);
      border-bottom: 1px solid var(--text-dark);
      padding-bottom: 3px;
      margin-right: 15px;
      transition: opacity 0.3s;
    }
    .btn-text:hover {
      opacity: 0.6;
    }

    /* Testimonials Carousel feel */
    .testimonial-wrap {
      padding: 80px 20px;
      text-align: center;
      background: #F0F0F0;
    }
    .testimonial {
      max-width: 600px;
      margin: 0 auto 40px auto;
    }
    .quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      font-style: italic;
      color: var(--text-dark);
      margin-bottom: 15px;
    }
    .stars {
      color: var(--text-dark);
      letter-spacing: 3px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
    }

    @media (max-width: 900px) {
      .split-image { min-height: 250px; }
      .navbar { padding: 12px 20px; }
      .nav-links { display: none; }
      .split-content { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="#" class="nav-brand">
      <object data="logo.svg" type="image/svg+xml" class="nav-logo" style="pointer-events: none;"></object>
      <span>HERITAGE</span>
    </a>
    <div class="nav-links">
      <a href="#about" class="nav-link active">About</a>
      <a href="#services" class="nav-link">Services</a>
      <a href="#shop" class="nav-link">Shop</a>
    </div>
  </nav>

  <div id="about-loading" class="loading">Curating experience...</div>
  <div id="about-content" style="display: none;">
    <section class="hero" id="about">
      <div class="hero-content">
        <h1 id="dyn-shop-name">Heritage Haircuts</h1>
        <p id="dyn-shop-desc">The modern standard for classic grooming.</p>
      </div>
    </section>

    <!-- The "Carte Blanche" style split section for Services -->
    <section class="split-section" id="services">
      <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1622286342621-4bd786c2447c?auto=format&fit=crop&w=1000&q=80');"></div>
      <div class="split-content">
        <span class="section-tag">Our Menu</span>
        <h2 class="section-heading">Bespoke<br>Services.</h2>
        <div id="services-loading" class="loading" style="padding: 20px 0;">Loading...</div>
        <ul class="item-list" id="services-list" style="display: none;"></ul>
      </div>
    </section>

    <!-- Reverse split section for Products -->
    <section class="split-section reverse" id="shop">
      <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1585232004423-244e0e6904e3?auto=format&fit=crop&w=1000&q=80');"></div>
      <div class="split-content">
        <span class="section-tag">Apothecary</span>
        <h2 class="section-heading">Curated<br>Goods.</h2>
        <div id="products-loading" class="loading" style="padding: 20px 0;">Loading...</div>
        <ul class="item-list" id="products-list" style="display: none;"></ul>
      </div>
    </section>

    <!-- Testimonials -->
    <section class="testimonial-wrap">
      <span class="section-tag">Client Words</span>
      <div id="reviews-loading" class="loading" style="padding: 20px 0;">Loading...</div>
      <div id="reviews-content" style="display: none;">
        <div id="reviews-list"></div>
        <button class="btn-solid" id="add-review-btn" style="margin-top: 40px;">Leave a Review</button>
      </div>
    </section>
  </div>

  <!-- Core SDK -->
  <script>
    (function() {
      let domain = window.location.origin;
      let isFileProtocol = window.location.protocol === "file:";
      if (domain === "null" || domain === "about://" || window.location.protocol === "about:" || isFileProtocol) {
        try { domain = window.parent.location.origin; } catch(e) {}
      }
      if (domain === "null" || domain === "about://" || !domain) {
        domain = "https://barbersaas-henna.vercel.app";
      }
      
      const sdkScript = document.createElement("script");
      sdkScript.src = isFileProtocol && domain === "file://" ? "../barbersaas-sdk.js?v=4" : domain + "/barbersaas-sdk.js?v=4";
      document.head.appendChild(sdkScript);
    })();
  </script>

  <script>
    // Smooth scroll for nav
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
        this.classList.add('active');
        
        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);
        if (targetElement) {
          const headerOffset = document.querySelector('.navbar').offsetHeight;
          const elementPosition = targetElement.getBoundingClientRect().top;
          window.scrollTo({ top: elementPosition + window.scrollY - headerOffset, behavior: "smooth" });
        }
      });
    });

    window.addEventListener("load", function () {
      function init() {
        if (typeof BarberSaaS === "undefined") return;
        
        const urlParams = new URLSearchParams(window.location.search);
        let shopId = urlParams.get("shopId");
        if (!shopId) {
            try {
                const parentParams = new URLSearchParams(window.parent.location.search);
                shopId = parentParams.get("shopId");
            } catch(e) {}
        }
        if (!shopId) {
            try {
                const paths = window.parent.location.pathname.split('/');
                shopId = paths[paths.length - 1];
            } catch(e) {}
        }
        shopId = shopId || "cmn9kj24n0000lqzc7kcsmpst";
        
        let domain = window.location.origin;
        let isFileProtocol = window.location.protocol === "file:";
        
        if (domain === "null" || domain === "about://" || window.location.protocol === "about:" || isFileProtocol) {
          try { domain = window.parent.location.origin; } catch(e) {}
        }
        if (domain === "null" || domain === "about://" || domain === "file://" || !domain) {
          domain = "https://barbersaas-henna.vercel.app";
        }
        
        const apiUrlToUse = (domain.includes("localhost") || domain.includes("127.0.0.1")) && !isFileProtocol ? domain : "https://barbersaas-henna.vercel.app";
        
        // Initialize SDK without hardcoded colors so it can fetch the shop data
        BarberSaaS.init(shopId, { 
            position: "bottom-right",
            apiUrl: apiUrlToUse
        });

        BarberSaaS.getPublicData().then((data) => {
          try {
            const shop = data.shop || {};
            
            // 1. Extract dynamic theme colors set by THIS specific shop's admin
            const primaryColor = shop.primaryColor || "#000000";
            const secondaryColor = shop.secondaryColor || "#ffffff";
            
            // 2. Set them on the SDK so widgets can read them
            window.BarberSaaS.primaryColor = primaryColor;
            window.BarberSaaS.secondaryColor = primaryColor;
            
            // 3. Inject CSS Variables onto the page so user profile avatars inherit them
            document.documentElement.style.setProperty('--primary', primaryColor);
            document.documentElement.style.setProperty('--theme-color', primaryColor);
            document.documentElement.style.setProperty('--brand-color', primaryColor);
            if (document.body) {
               document.body.style.setProperty('--primary', primaryColor);
               document.body.style.setProperty('--theme-color', primaryColor);
               document.body.style.setProperty('--brand-color', primaryColor);
            }
            
            const styleEl = document.createElement('style');
            styleEl.innerHTML = `
              :root {
                --brand-color: ${primaryColor} !important;
                --theme-color: ${primaryColor} !important;
                --widget-border: ${primaryColor} !important;
              }
              .supabase-auth-ui_ui-button, .supabase-account-avatar, [id*="supabase-"], [class*="supabase-"], [class*="avatar"], [id*="avatar"], [class*="user-profile"], [class*="profile-badge"] {
                 color: ${primaryColor} !important;
                 border-color: ${primaryColor} !important;
                 outline-color: ${primaryColor} !important;
              }
              [class*="avatar"] svg, [class*="user-profile"] svg, [class*="chat-button"] {
                 fill: ${primaryColor} !important;
              }
            `;
            document.head.appendChild(styleEl);
            
            // 4. Inject the Chatbot and Booking widgets dynamically NOW that colors are set
            setTimeout(() => {
                let domain = window.location.origin;
                let isFileProtocol = window.location.protocol === "file:";
                if (domain === "null" || domain === "about://" || window.location.protocol === "about:" || isFileProtocol) {
                  try { domain = window.parent.location.origin; } catch(e) {}
                }
                if (domain === "null" || domain === "about://" || !domain) {
                  domain = "https://barbersaas-henna.vercel.app";
                }
                
                const cacheBuster = "?v=" + new Date().getTime();
                const widgetUrlPrefix = (isFileProtocol && domain === "file://") ? ".." : domain;
                
                const modalScript = document.createElement("script");
                modalScript.src = widgetUrlPrefix + "/booking-modal.js" + cacheBuster;
                modalScript.setAttribute("data-shop-id", shopId);
                modalScript.setAttribute("data-theme-color", primaryColor);
                modalScript.setAttribute("data-secondary-color", primaryColor);
                document.body.appendChild(modalScript);
                
                const widgetScript = document.createElement("script");
                widgetScript.src = widgetUrlPrefix + "/booking-widget.js" + cacheBuster;
                widgetScript.setAttribute("data-shop-id", shopId);
                widgetScript.setAttribute("data-theme-color", primaryColor);
                widgetScript.setAttribute("data-secondary-color", primaryColor);
                document.body.appendChild(widgetScript);
            }, 50);
          } catch(e) { console.error(e); }

          // General
          try {
            document.getElementById('dyn-shop-name').textContent = data.shop.name || "Heritage Haircuts";
            document.getElementById('dyn-shop-desc').textContent = data.shop.description || "The modern standard for classic grooming.";
            document.getElementById("about-loading").style.display = "none";
            document.getElementById("about-content").style.display = "block";
          } catch(e) {}

          // Services
          try {
            const services = (data.services || []).filter(s => s.duration > 0);
            if (services.length > 0) {
              document.getElementById("services-list").innerHTML = services.map(s => {
                const desc = s.description || "A tailored experience.";
                const truncatedDesc = desc.length > 80 ? desc.substring(0, 80) + "..." : desc;
                return `
                <li class="item-row">
                  <div class="item-header">
                    <h3 class="item-title">${s.name}</h3>
                    <span class="item-price">$${Number(s.price).toFixed(2)}</span>
                  </div>
                  <p class="item-desc">${truncatedDesc} &mdash; ${s.duration} Min</p>
                  <div>
                    <button class="btn-text b-book" data-id="${s.id}">Book Appointment</button>
                  </div>
                </li>
              `}).join('');
              document.querySelectorAll(".b-book").forEach(b => b.addEventListener('click', e => {
                if (window.BarberBooking) window.BarberBooking.open(e.target.dataset.id);
              }));
            }
            document.getElementById("services-loading").style.display = "none";
            document.getElementById("services-list").style.display = "block";
          } catch(e) {}

          // Products
          try {
            const products = data.products || [];
            if (products.length > 0) {
              document.getElementById("products-list").innerHTML = products.map(p => {
                const desc = p.description || "Premium grooming essential.";
                const truncatedDesc = desc.length > 80 ? desc.substring(0, 80) + "..." : desc;
                return `
                <li class="item-row">
                  <div class="item-header">
                    <h3 class="item-title">${p.name}</h3>
                    <span class="item-price">$${Number(p.price).toFixed(2)}</span>
                  </div>
                  <p class="item-desc">${truncatedDesc}</p>
                  <div>
                    <button class="btn-text b-view" data-id="${p.id}">Details</button>
                    <button class="btn-text b-buy" data-id="${p.id}">Purchase</button>
                  </div>
                </li>
              `}).join('');
              document.querySelectorAll(".b-buy").forEach(btn => btn.addEventListener("click", e => {
                BarberSaaS.getProductDetails(e.target.dataset.id).then(p => alert("Checkout for 1x " + p.name));
              }));
              document.querySelectorAll(".b-view").forEach(btn => btn.addEventListener("click", e => {
                BarberSaaS.getProductDetails(e.target.dataset.id).then(p => alert(p.name + "\\n$" + p.price + "\\n" + p.description));
              }));
            }
            document.getElementById("products-loading").style.display = "none";
            document.getElementById("products-list").style.display = "block";
          } catch(e) {}

          // Reviews
          try {
            const reviews = data.reviews || [];
            if (reviews.length > 0) {
              // Only show top 3 for this layout to keep it clean
              document.getElementById("reviews-list").innerHTML = reviews.slice(0,3).map(r => `
                <div class="testimonial">
                  <div class="stars">${"★".repeat(r.rating || 5)}</div>
                  <p class="quote">"${r.comment || "An absolutely stellar experience."}"</p>
                </div>
              `).join('');
            }
            document.getElementById("add-review-btn").addEventListener("click", () => {
              const aptId = prompt("Appointment ID:");
              const rating = prompt("Rating (1-5):", "5");
              const comment = prompt("Comments:");
              if(aptId && rating && comment) {
                BarberSaaS.submitReview({appointmentId: aptId, rating: parseInt(rating), comment}).then(() => alert("Thank you.")).catch(e => alert("Error: " + e.message));
              }
            });
            document.getElementById("reviews-loading").style.display = "none";
            document.getElementById("reviews-content").style.display = "block";
          } catch(e) {}
        });
      }

      if (typeof BarberSaaS !== "undefined") init();
      else {
        let attempts = 0;
        let intv = setInterval(() => {
          attempts++;
          if(typeof BarberSaaS !== "undefined" || attempts >= 50) { clearInterval(intv); init(); }
        }, 100);
      }
    });
  </script>
</body>
</html>
