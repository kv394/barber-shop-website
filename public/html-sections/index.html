<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport Clips - Haircuts for Men</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #E31837; /* Sport Clips Red */
      --black: #000000;
      --dark-gray: #222222;
      --light-gray: #F4F4F4;
      --white: #FFFFFF;
      --text-main: #333333;
    }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--white);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    h1, h2, h3, .sport-title {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Navbar */
    .navbar {
      background: var(--white);
      color: var(--black);
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      flex-wrap: wrap;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-logo {
      width: 40px;
      height: 40px;
      color: var(--primary);
    }
    .nav-links {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      padding-right: 80px;
    }
    .navbar a {
      color: var(--black);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: color 0.3s;
      padding: 5px 10px;
    }
    .navbar a:hover, .navbar a.active {
      color: var(--primary);
    }
    .nav-cta {
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px !important;
      border-radius: 4px;
      border: 2px solid var(--primary);
    }
    .nav-cta:hover {
      background: var(--white);
      color: var(--primary) !important;
    }

    /* Hero / About */
    .hero-section {
      text-align: center;
      padding: 100px 20px;
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=2000&q=80') center/cover;
      color: var(--white);
    }
    .hero-section h1 {
      font-size: clamp(3rem, 8vw, 5rem);
      margin: 0 0 10px 0;
      color: var(--white);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .hero-section p {
      font-size: 1.5rem;
      max-width: 800px;
      margin: 0 auto 30px;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    /* Containers */
    .container {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .section-header {
      font-size: 3rem;
      color: var(--black);
      margin-bottom: 20px;
      position: relative;
      display: inline-block;
      text-transform: uppercase;
      font-weight: 900;
    }
    .section-header::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 4px;
      background: var(--primary);
    }
    .section-header-wrap {
      text-align: center;
      margin-bottom: 50px;
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    /* Cards */
    .card {
      background: var(--light-gray);
      border-top: 4px solid var(--primary);
      padding: 18px 14px 14px 14px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      width: 100%;
      min-width: 0;
      min-height: 270px;
      max-width: 340px;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      margin: 0 auto;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .card-title {
      font-size: 1.15rem;
      color: var(--black);
      margin: 0 0 15px 0;
      text-transform: uppercase;
      font-weight: 900;
    }
    .card-price {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--primary);
      margin-bottom: 15px;
    }
    .card-desc {
      font-size: 0.85rem;
      margin-bottom: 12px;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 3.8em;
      max-height: 4.2em;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-top: auto;
      justify-content: center;
      align-items: stretch;
    }

    .card-actions .btn {
      flex: 1;
      min-width: 0;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 14px 0;
    }

    .card-actions .btn-outline {
      background: transparent;
      color: var(--black);
      border-color: var(--black);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    /* Buttons */
    .btn {
      display: inline-block;
      background: var(--primary);
      color: var(--white);
      border: 2px solid var(--primary);
      padding: 16px 0;
      font-family: 'Roboto', sans-serif;
      font-size: 1.08rem;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 6px;
      width: 96%;
      max-width: 260px;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-top: auto;
      margin-bottom: 0;
      align-self: center;
    }

    /* Make the Check In button larger and more prominent */
    .b-book.btn {
      padding: 14px 0;
      font-size: 1.05rem;
      font-weight: 800;
      border-radius: 24px;
      max-width: 220px;
      box-shadow: 0 2px 8px rgba(227,24,55,0.10);
      letter-spacing: 0.5px;
      margin-top: auto;
      margin-bottom: 0;
      background: linear-gradient(90deg, var(--primary) 60%, #ff5a5f 100%);
      border: none;
      color: #fff;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      text-shadow: 0 1px 2px rgba(0,0,0,0.07);
    }
    .b-book.btn:hover {
      background: linear-gradient(90deg, #ff5a5f 0%, var(--primary) 100%);
      box-shadow: 0 4px 16px rgba(227,24,55,0.18);
      transform: translateY(-2px) scale(1.03);
    }
    .btn:hover {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }
    .btn-outline {
      background: transparent;
      color: var(--black);
      border-color: var(--black);
      font-weight: 800;
      padding: 16px 0;
      border-radius: 6px;
      width: 96%;
      max-width: 260px;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .btn.b-view, .btn-outline.b-view {
      font-size: 1.22rem !important;
    }
    .btn-outline:hover {
      background: var(--black);
      color: var(--white);
    }

    /* Testimonials */
    .testimonial {
      background: var(--white);
      border: 1px solid #ddd;
      padding: 30px;
      position: relative;
    }
    .testimonial::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 4rem;
      color: var(--light-gray);
      font-family: Georgia, serif;
      line-height: 1;
    }
    .testimonial-stars {
      color: var(--primary);
      font-size: 1.5rem;
      margin-bottom: 15px;
    }
    .testimonial-quote {
      font-size: 1.1rem;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .loading {
      text-align: center;
      font-size: 1.5rem;
      padding: 50px 0;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--primary);
      animation: pulse 1s infinite alternate;
    }
    @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

    @media (max-width: 768px) {
      .nav-container { flex-direction: column; gap: 15px; }
      .hero-section { padding: 60px 20px; }
      .section-header { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="#" class="nav-brand">
        <object data="logo.svg" type="image/svg+xml" class="nav-logo" style="pointer-events: none;"></object>
        <span id="dyn-shop-name-nav" style="font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; letter-spacing: -1px; color: var(--primary);">SPORT CLIPS</span>
      </a>
      <div class="nav-links">
        <a href="#about" class="nav-link active">The MVP</a>
        <a href="#services" class="nav-link">Haircuts</a>
        <a href="#shop" class="nav-link">Products</a>
        <a href="#reviews" class="nav-link">Reviews</a>
        <a href="#services" class="nav-link nav-cta">Check In Now</a>
      </div>
    </div>
  </nav>

  <article id="about">
    <div id="about-loading" class="loading">Loading Stats...</div>
    <div id="about-content" style="display: none;">
      <section class="hero-section">
        <h1 id="dyn-shop-name">Sport Clips Haircuts</h1>
        <p id="dyn-shop-desc">It's good to be a guy.</p>
        <button class="btn hero-btn" style="max-width: 340px; min-height: 56px; font-size: 1.22rem; font-weight: 900; border-radius: 28px; letter-spacing: 1px; margin: 0 auto 10px auto; display: block; box-shadow: 0 4px 18px rgba(227,24,55,0.13); background: linear-gradient(90deg, var(--primary) 60%, #ff5a5f 100%); border: none;" onclick="document.querySelector('#services').scrollIntoView({behavior: 'smooth'})">Find a Service</button>
      </section>
    </div>
  </article>

  <article id="services" class="container">
    <div id="services-loading" class="loading">Loading Playbook...</div>
    <div id="services-content" style="display: none;">
      <div class="section-header-wrap">
        <h2 class="section-header">Haircuts & Services</h2>
      </div>
      <div class="grid" id="services-list"></div>
    </div>
  </article>

  <article id="shop" class="container" style="background-color: var(--light-gray); padding-top: 60px; padding-bottom: 60px; max-width: 100%;">
    <div style="max-width: 1200px; margin: 0 auto;">
      <div id="products-loading" class="loading">Loading Gear...</div>
      <div id="products-content" style="display: none;">
        <div class="section-header-wrap">
          <h2 class="section-header">Pro Gear</h2>
        </div>
        <div class="grid" id="products-list"></div>
      </div>
    </div>
  </article>

  <article id="reviews" class="container" style="margin-bottom: 100px;">
    <div id="reviews-loading" class="loading">Loading Highlights...</div>
    <div id="reviews-content" style="display: none;">
      <div class="section-header-wrap">
        <h2 class="section-header">Fan Highlights</h2>
      </div>
      <div class="grid" id="reviews-list"></div>
      <div style="text-align: center; margin-top: 50px;">
        <button class="btn btn-outline" id="add-review-btn" style="max-width: 300px;">Submit Highlight</button>
      </div>
    </div>
  </article>

  <!-- Core SDK -->
  <script>
    (function() {
      let domain = window.location.origin;
      let isFileProtocol = window.location.protocol === "file:";
      if (domain === "null" || domain === "about://" || window.location.protocol === "about:" || isFileProtocol) {
        try { domain = window.parent.location.origin; } catch(e) {}
      }
      if (domain === "null" || domain === "about://" || !domain) {
        domain = "https://barbersaas-henna.vercel.app";
      }
      
      const sdkScript = document.createElement("script");
      sdkScript.src = isFileProtocol && domain === "file://" ? "../barbersaas-sdk.js?v=4" : domain + "/barbersaas-sdk.js?v=4";
      document.head.appendChild(sdkScript);
    })();
  </script>
  <script>
    // Smooth scrolling nav
    document.querySelectorAll('.nav-link:not(.nav-cta)').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
        this.classList.add('active');
        
        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);
        if (targetElement) {
          const headerOffset = document.querySelector('.navbar').offsetHeight;
          const elementPosition = targetElement.getBoundingClientRect().top;
          window.scrollTo({ top: elementPosition + window.scrollY - headerOffset, behavior: "smooth" });
        }
      });
    });

    window.addEventListener("load", function () {
      function initializeShop() {
        if (typeof BarberSaaS === "undefined") return;
        
        const urlParams = new URLSearchParams(window.location.search);
        let shopId = urlParams.get("shopId");
        if (!shopId) {
            try {
                const parentParams = new URLSearchParams(window.parent.location.search);
                shopId = parentParams.get("shopId");
            } catch(e) {}
        }
        if (!shopId) {
            try {
                const paths = window.parent.location.pathname.split('/');
                shopId = paths[paths.length - 1];
            } catch(e) {}
        }
        shopId = shopId || "cmn9kj24n0000lqzc7kcsmpst";
        
        let domain = window.location.origin;
        let isFileProtocol = window.location.protocol === "file:";
        
        if (domain === "null" || domain === "about://" || window.location.protocol === "about:" || isFileProtocol) {
          try { domain = window.parent.location.origin; } catch(e) {}
        }
        if (domain === "null" || domain === "about://" || domain === "file://" || !domain) {
          domain = "https://barbersaas-henna.vercel.app";
        }
        
        const apiUrlToUse = (domain.includes("localhost") || domain.includes("127.0.0.1")) && !isFileProtocol ? domain : "https://barbersaas-henna.vercel.app";

        // Initialize SDK without hardcoded colors so it can fetch the shop data
        BarberSaaS.init(shopId, { 
            position: "bottom-right",
            apiUrl: apiUrlToUse
        });

        BarberSaaS.getPublicData().then((data) => {
          try {
            const shop = data.shop || {};
            
            // 1. Extract dynamic theme colors set by THIS specific shop's admin
            const primaryColor = shop.primaryColor || "#E31837"; // fallback to Sport Clips Red (primary/accent for widgets)
            const secondaryColor = shop.secondaryColor || "#000000"; // fallback to black
            
            // 2. Set them on the SDK so widgets can read them
            window.BarberSaaS.primaryColor = primaryColor;
            window.BarberSaaS.secondaryColor = secondaryColor;
            
            // 3. Inject CSS Variables onto the page so user profile avatars inherit them
            document.documentElement.style.setProperty('--primary', primaryColor, 'important');
            document.documentElement.style.setProperty('--primary-color', primaryColor, 'important');
            document.documentElement.style.setProperty('--theme-color', primaryColor, 'important');
            document.documentElement.style.setProperty('--brand-color', primaryColor, 'important');
            if (document.body) {
               document.body.style.setProperty('--primary', primaryColor, 'important');
               document.body.style.setProperty('--primary-color', primaryColor, 'important');
               document.body.style.setProperty('--theme-color', primaryColor, 'important');
               document.body.style.setProperty('--brand-color', primaryColor, 'important');
            }
            
            const styleEl = document.createElement('style');
            styleEl.innerHTML = `
              :root {
                --primary: ${primaryColor} !important;
                --brand-color: ${primaryColor} !important;
                --theme-color: ${primaryColor} !important;
                --widget-border: ${primaryColor} !important;
              }
              .supabase-auth-ui_ui-button, .supabase-account-avatar, [id*="supabase-"], [class*="supabase-"], [class*="avatar"], [id*="avatar"], [class*="user-profile"], [class*="profile-badge"], a[href*="/sign-in"] {
                 color: ${primaryColor} !important;
                 border-color: ${primaryColor} !important;
                 outline-color: ${primaryColor} !important;
              }
              [class*="avatar"] svg, [class*="user-profile"] svg, [class*="chat-button"], #widget-button {
                 fill: ${primaryColor} !important;
                 background-color: ${primaryColor} !important;
              }
              #widget-button svg {
                 fill: #ffffff !important;
              }
            `;
            document.body.appendChild(styleEl);

            // 4. Inject the Chatbot and Booking widgets dynamically NOW that colors are set
            setTimeout(() => {
                let domain = window.location.origin;
                let isFileProtocol = window.location.protocol === "file:";
                if (domain === "null" || domain === "about://" || window.location.protocol === "about:" || isFileProtocol) {
                  try { domain = window.parent.location.origin; } catch(e) {}
                }
                if (domain === "null" || domain === "about://" || !domain) {
                  domain = "https://barbersaas-henna.vercel.app";
                }
                
                const cacheBuster = "?v=" + new Date().getTime();
                const widgetUrlPrefix = (isFileProtocol && domain === "file://") ? ".." : domain;
                
                const modalScript = document.createElement("script");
                modalScript.src = widgetUrlPrefix + "/booking-modal.js" + cacheBuster;
                modalScript.setAttribute("data-shop-id", shopId);
                modalScript.setAttribute("data-theme-color", primaryColor);
                modalScript.setAttribute("data-secondary-color", primaryColor);
                document.body.appendChild(modalScript);
                
                const widgetScript = document.createElement("script");
                widgetScript.src = widgetUrlPrefix + "/booking-widget.js" + cacheBuster;
                widgetScript.setAttribute("data-shop-id", shopId);
                widgetScript.setAttribute("data-theme-color", primaryColor);
                widgetScript.setAttribute("data-secondary-color", primaryColor);
                document.body.appendChild(widgetScript);
            }, 50);

          } catch(e) { console.error(e); }

          // About
          try {
            document.getElementById('dyn-shop-name').textContent = data.shop.name || "Sport Clips Haircuts";
            document.getElementById('dyn-shop-name-nav').textContent = data.shop.name || "SPORT CLIPS";
            document.getElementById('dyn-shop-desc').textContent = data.shop.description || "It's good to be a guy.";
            document.getElementById("about-loading").style.display = "none";
            document.getElementById("about-content").style.display = "block";
          } catch(e) {}

          // Services
          try {
            const services = (data.services || []).filter(s => s.duration > 0);
            if (services.length > 0) {
              document.getElementById("services-list").innerHTML = services.map(s => {
                const desc = s.description || "The MVP Experience.";
                const truncatedDesc = desc.length > 80 ? desc.substring(0, 80) + "..." : desc;
                return `
                <div class="card">
                  <h3 class="card-title">${s.name}</h3>
                  <div class="card-price">$${Number(s.price).toFixed(2)} <span style="font-size: 1rem; color: var(--text-main);">/ ${s.duration} MIN</span></div>
                  <p class="card-desc">${truncatedDesc}</p>
                  <button class="btn b-book" data-id="${s.id}">Check In</button>
                </div>
              `}).join('');
              document.querySelectorAll(".b-book").forEach(b => b.addEventListener('click', e => {
                if (window.BarberBooking) window.BarberBooking.open(e.target.dataset.id);
              }));
            }
            document.getElementById("services-loading").style.display = "none";
            document.getElementById("services-content").style.display = "block";
          } catch(e) {}

          // Products
          try {
            const products = data.products || [];
            if (products.length > 0) {
              document.getElementById("products-list").innerHTML = products.map(p => {
                const desc = p.description || "Top-tier grooming gear.";
                const truncatedDesc = desc.length > 80 ? desc.substring(0, 80) + "..." : desc;
                return `
                <div class="card" style="background: var(--white);">
                  <h3 class="card-title">${p.name}</h3>
                  <div class="card-price">$${Number(p.price).toFixed(2)}</div>
                  <p class="card-desc">${truncatedDesc}</p>
                  <div class="card-actions">
                    <button class="btn btn-outline b-view" data-id="${p.id}">Details</button>
                    <button class="btn b-buy" data-id="${p.id}">Buy Now</button>
                  </div>
                </div>
              `}).join('');
              document.querySelectorAll(".b-buy").forEach(btn => btn.addEventListener("click", e => {
                BarberSaaS.getProductDetails(e.target.dataset.id).then(p => alert("Added to cart: 1x " + p.name));
              }));
              document.querySelectorAll(".b-view").forEach(btn => btn.addEventListener("click", e => {
                BarberSaaS.getProductDetails(e.target.dataset.id).then(p => alert(p.name + "\\n$" + p.price + "\\n" + p.description));
              }));
            }
            document.getElementById("products-loading").style.display = "none";
            document.getElementById("products-content").style.display = "block";
          } catch(e) {}

          // Reviews
          try {
            const reviews = data.reviews || [];
            if (reviews.length > 0) {
              document.getElementById("reviews-list").innerHTML = reviews.slice(0, 3).map(r => `
                <div class="testimonial">
                  <div class="testimonial-stars">${"★".repeat(r.rating || 5)}</div>
                  <p class="testimonial-quote">${r.comment || "Great experience, highly recommend!"}</p>
                </div>
              `).join('');
            }
            document.getElementById("add-review-btn").addEventListener("click", () => {
              const aptId = prompt("Enter Check-In ID:");
              const rating = prompt("Rating (1-5):", "5");
              const comment = prompt("Comments:");
              if(aptId && rating && comment) {
                BarberSaaS.submitReview({appointmentId: aptId, rating: parseInt(rating), comment}).then(() => alert("Highlight submitted!")).catch(e => alert("Error: " + e.message));
              }
            });
            document.getElementById("reviews-loading").style.display = "none";
            document.getElementById("reviews-content").style.display = "block";
          } catch(e) {}
        });
      }

      if (typeof BarberSaaS !== "undefined") initializeShop();
      else {
        let attempts = 0;
        let intv = setInterval(() => {
          attempts++;
          if(typeof BarberSaaS !== "undefined" || attempts >= 50) { clearInterval(intv); initializeShop(); }
        }, 100);
      }
    });
  </script>
</body>
</html>
