<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sport Clips - Haircuts for Men</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #e31837; /* Sport Clips Red */
        --black: #000000;
        --dark-gray: #222222;
        --light-gray: #f4f4f4;
        --white: #ffffff;
        --text-main: #333333;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Roboto", sans-serif;
        background-color: var(--white);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        line-height: 1.6;
      }

      h1,
      h2,
      h3,
      .sport-title {
        font-family: "Roboto", sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        text-align: center;
        letter-spacing: 1px;
      }

      /* Navbar - Aligned with user profile (top: 24px) */
      .navbar {
        background: var(--white);
        color: var(--black);
        padding: 21px 0; /* Adjusted for profile alignment */
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 2px solid var(--primary);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        min-height: 82px;
        box-sizing: border-box;
      }
      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        flex-wrap: wrap;
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo {
        width: 36px;
        height: 36px;
        color: var(--primary);
      }
      .nav-links {
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        padding-right: 90px; /* Room for the auth button */
      }
      .navbar a {
        color: var(--black);
        text-decoration: none;
        font-size: 0.9rem; /* Reduced font size */
        font-weight: 700;
        text-transform: uppercase;
        transition: color 0.3s;
        padding: 5px 8px;
      }
      .navbar a:hover,
      .navbar a.active {
        color: var(--primary);
      }
      .nav-cta {
        background: var(--primary);
        color: var(--white) !important;
        padding: 8px 16px !important;
        border-radius: 4px;
        border: 2px solid var(--primary);
      }
      .nav-cta:hover {
        background: var(--white);
        color: var(--primary) !important;
      }

      /* Hero / About */
      .hero-section {
        text-align: center;
        padding: 80px 20px;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=2000&q=80")
            center/cover;
        color: var(--white);
      }
      .hero-section h1 {
        font-size: clamp(2rem, 6vw, 4rem); /* Reduced font size */
        margin: 0 0 10px 0;
        color: var(--white);
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
      .hero-section p {
        font-size: 1.2rem; /* Reduced font size */
        max-width: 800px;
        margin: 0 auto 30px;
        font-weight: 700;
        text-transform: uppercase;
      }

      /* Containers */
      .container {
        max-width: 1200px;
        margin: 50px auto;
        padding: 0 20px;
      }
      .section-header {
        font-size: 2.2rem; /* Reduced font size */
        color: var(--black);
        margin-bottom: 20px;
        position: relative;
        display: inline-block;
        text-transform: uppercase;
        font-weight: 900;
      }
      .section-header::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 4px;
        background: var(--primary);
      }
      .section-header-wrap {
        text-align: center;
        margin-bottom: 40px;
      }

      /* Grid Layout */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
      }

      /* Cards - Uniform Sizing */
      .card {
        background: var(--light-gray);
        border-top: 4px solid var(--primary);
        padding: 20px;
        text-align: center;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        min-height: 250px; /* Uniform height constraint */
        height: 100%;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      }
      .card-title {
        font-size: 1.05rem; /* Reduced font size */
        color: var(--black);
        margin: 0 0 10px 0;
        text-transform: uppercase;
        font-weight: 900;
      }
      .card-price {
        font-size: 1.1rem;
        font-weight: 900;
        color: var(--primary);
        margin-bottom: 12px;
      }
      /* Description truncation */
      .card-desc {
        font-size: 0.85rem;
        margin-bottom: 15px;
        color: var(--text-main);
        display: -webkit-box;
        -webkit-line-clamp: 2; /* Limit to 2 lines */
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 2.8em;
      }

      .card-actions {
        display: flex;
        gap: 10px;
        width: 100%;
        margin-top: auto;
        justify-content: center;
      }

      .card-actions .btn {
        flex: 1;
        padding: 12px 0;
      }

      /* Buttons */
      .btn {
        display: inline-block;
        background: var(--primary);
        color: var(--white);
        border: 2px solid var(--primary);
        padding: 14px 0;
        font-family: "Roboto", sans-serif;
        font-size: 0.95rem; /* Reduced font size */
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s;
        border-radius: 6px;
        width: 100%;
        box-sizing: border-box;
        margin-top: auto;
      }
      .b-book.btn {
        border-radius: 20px;
        box-shadow: 0 2px 6px rgba(227, 24, 55, 0.1);
        background: linear-gradient(90deg, var(--primary) 60%, #ff5a5f 100%);
        border: none;
        color: #fff;
      }
      .b-book.btn:hover {
        background: linear-gradient(90deg, #ff5a5f 0%, var(--primary) 100%);
        box-shadow: 0 4px 12px rgba(227, 24, 55, 0.18);
        transform: translateY(-2px);
      }
      .btn:hover {
        background: var(--black);
        border-color: var(--black);
        color: var(--white);
      }
      .btn-outline {
        background: transparent;
        color: var(--black);
        border-color: var(--black);
      }
      .btn-outline:hover {
        background: var(--black);
        color: var(--white);
      }

      /* Testimonials */
      .testimonial {
        background: var(--white);
        border: 1px solid #ddd;
        padding: 25px;
        position: relative;
      }
      .testimonial::before {
        content: '"';
        position: absolute;
        top: 5px;
        left: 15px;
        font-size: 3rem;
        color: var(--light-gray);
        font-family: Georgia, serif;
        line-height: 1;
      }
      .testimonial-stars {
        color: var(--primary);
        font-size: 1.2rem;
        margin-bottom: 10px;
      }
      .testimonial-quote {
        font-size: 0.95rem;
        font-style: italic;
        position: relative;
        z-index: 1;
      }

      .loading {
        text-align: center;
        font-size: 1.2rem;
        padding: 40px 0;
        font-weight: 900;
        text-transform: uppercase;
        color: var(--primary);
        animation: pulse 1s infinite alternate;
      }
      @keyframes pulse {
        0% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

      @media (max-width: 768px) {
        .nav-container {
          flex-direction: column;
          gap: 10px;
          padding: 15px;
        }
        .nav-links {
          padding-right: 0;
          padding-top: 10px;
          width: 100%;
          justify-content: center;
          gap: 10px;
        }
        .navbar a {
          font-size: 0.85rem;
          padding: 5px;
        }
        .nav-cta {
          width: 100%;
          text-align: center;
          margin-top: 5px;
        }
        .hero-section {
          padding: 40px 15px;
        }
        .hero-section h1 {
          font-size: 2.2rem;
        }
        .hero-section p {
          font-size: 1rem;
        }
        .section-header {
          font-size: 1.8rem;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="#" class="nav-brand">
          <object
            data="logo.svg"
            type="image/svg+xml"
            class="nav-logo"
            style="pointer-events: none"
          ></object>
          <span
            id="dyn-shop-name-nav"
            style="
              font-family: &quot;Roboto&quot;, sans-serif;
              font-weight: 900;
              font-size: 1.2rem;
              text-transform: uppercase;
              letter-spacing: -1px;
              color: var(--primary);
            "
            >SPORT CLIPS</span
          >
        </a>
        <div class="nav-links">
          <a href="#about" class="nav-link active">The MVP</a>
          <a href="#services" class="nav-link">Haircuts</a>
          <a href="#shop" class="nav-link">Products</a>
          <a href="#reviews" class="nav-link">Reviews</a>
          <a
            href="#"
            onclick="
              event.preventDefault();
              if (window.BarberBooking) window.BarberBooking.open();
            "
            class="nav-link nav-cta"
            >Check In Now</a
          >
        </div>
      </div>
    </nav>

    <article id="about">
      <div id="about-loading" class="loading">Loading Stats...</div>
      <div id="about-content" style="display: none">
        <section class="hero-section">
          <h1 id="dyn-shop-name">Sport Clips Haircuts</h1>
          <p id="dyn-shop-desc">It's good to be a guy.</p>
        </section>
      </div>
    </article>

    <article id="services" class="container">
      <div id="services-loading" class="loading">Loading Playbook...</div>
      <div id="services-content" style="display: none">
        <div class="section-header-wrap">
          <h2 class="section-header">Haircuts & Services</h2>
        </div>
        <div class="grid" id="services-list"></div>
      </div>
    </article>

    <article
      id="shop"
      class="container"
      style="
        background-color: var(--light-gray);
        padding-top: 50px;
        padding-bottom: 50px;
        max-width: 100%;
      "
    >
      <div style="max-width: 1200px; margin: 0 auto">
        <div id="products-loading" class="loading">Loading Gear...</div>
        <div id="products-content" style="display: none">
          <div class="section-header-wrap">
            <h2 class="section-header">Pro Gear</h2>
          </div>
          <div class="grid" id="products-list"></div>
        </div>
      </div>
    </article>

    <article id="reviews" class="container" style="margin-bottom: 80px">
      <div id="reviews-loading" class="loading">Loading Highlights...</div>
      <div id="reviews-content" style="display: none">
        <div class="section-header-wrap">
          <h2 class="section-header">Fan Highlights</h2>
        </div>
        <div class="grid" id="reviews-list"></div>
        <div style="text-align: center; margin-top: 40px">
          <button
            class="btn btn-outline"
            id="add-review-btn"
            style="max-width: 260px"
          >
            Submit Highlight
          </button>
        </div>
      </div>
    </article>

    <!-- Core SDK Setup -->
    <script>
      (function () {
        let domain = window.location.origin;
        let isFileProtocol = window.location.protocol === "file:";
        if (
          domain === "null" ||
          domain === "about://" ||
          window.location.protocol === "about:" ||
          isFileProtocol
        ) {
          try {
            domain = window.parent.location.origin;
          } catch (e) {}
        }
        if (domain === "null" || domain === "about://" || !domain) {
          domain = "https://barbersaas-henna.vercel.app";
        }

        const sdkScript = document.createElement("script");
        sdkScript.src =
          isFileProtocol && domain === "file://"
            ? "../barbersaas-sdk.js?v=5"
            : domain + "/barbersaas-sdk.js?v=5";
        document.head.appendChild(sdkScript);
      })();
    </script>

    <script>
      // Smooth scrolling nav
      document.querySelectorAll(".nav-link:not(.nav-cta)").forEach((link) => {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          document
            .querySelectorAll(".nav-link")
            .forEach((a) => a.classList.remove("active"));
          this.classList.add("active");

          const targetId = this.getAttribute("href");
          const targetElement = document.querySelector(targetId);
          if (targetElement) {
            const headerOffset = document.querySelector(".navbar").offsetHeight;
            const elementPosition = targetElement.getBoundingClientRect().top;
            window.scrollTo({
              top: elementPosition + window.scrollY - headerOffset,
              behavior: "smooth",
            });
          }
        });
      });

      window.addEventListener("load", function () {
        function initializeShop() {
          if (typeof BarberSaaS === "undefined") return;

          const urlParams = new URLSearchParams(window.location.search);
          let shopId = urlParams.get("shopId");
          if (!shopId) {
            try {
              const parentParams = new URLSearchParams(
                window.parent.location.search,
              );
              shopId = parentParams.get("shopId");
            } catch (e) {}
          }
          if (!shopId) {
            try {
              const paths = window.parent.location.pathname.split("/");
              shopId = paths[paths.length - 1];
            } catch (e) {}
          }
          shopId = shopId || "cmn9kj24n0000lqzc7kcsmpst";

          let domain = window.location.origin;
          let isFileProtocol = window.location.protocol === "file:";

          if (
            domain === "null" ||
            domain === "about://" ||
            window.location.protocol === "about:" ||
            isFileProtocol
          ) {
            try {
              domain = window.parent.location.origin;
            } catch (e) {}
          }
          if (
            domain === "null" ||
            domain === "about://" ||
            domain === "file://" ||
            !domain
          ) {
            domain = "https://barbersaas-henna.vercel.app";
          }

          const apiUrlToUse =
            (domain.includes("localhost") || domain.includes("127.0.0.1")) &&
            !isFileProtocol
              ? domain
              : "https://barbersaas-henna.vercel.app";

          // Initialize SDK
          BarberSaaS.init(shopId, {
            position: "bottom-right",
            apiUrl: apiUrlToUse,
          });

          BarberSaaS.getPublicData()
            .then((data) => {
              try {
                const shop = data.shop || {};

                // 1. Extract dynamic theme colors
                const primaryColor = shop.primaryColor || "#E31837";
                const secondaryColor = shop.secondaryColor || "#000000";

                window.BarberSaaS.primaryColor = primaryColor;
                window.BarberSaaS.secondaryColor = secondaryColor;

                // 2. Apply Theme colors to root
                document.documentElement.style.setProperty(
                  "--primary",
                  primaryColor,
                  "important",
                );

                // 3. Inject CSS overrides for the external user profile (which loads outside the iframe) and Chatbot
                const styleEl = document.createElement("style");
                styleEl.innerHTML = `
              :root {
                --primary: \${primaryColor} !important;
                --brand-color: \${primaryColor} !important;
              }
              .supabase-auth-ui_ui-button, [class*="supabase-"], [class*="avatar"], [class*="user-profile"], [class*="profile-badge"], a[href*="/sign-in"], .text-crm-primary {
                 color: \${primaryColor} !important;
                 border-color: \${primaryColor} !important;
              }
              [class*="avatar"] svg, [class*="user-profile"] svg, [class*="chat-button"], #widget-button, .bg-crm-primary {
                 fill: \${primaryColor} !important;
                 background-color: \${primaryColor} !important;
              }
            `;
                document.body.appendChild(styleEl);

                // 4. Safely Inject Chatbot and Booking widgets
                setTimeout(() => {
                  const cacheBuster = "?v=" + new Date().getTime();
                  const widgetUrlPrefix =
                    isFileProtocol && domain === "file://" ? ".." : domain;

                  const modalScript = document.createElement("script");
                  modalScript.src =
                    widgetUrlPrefix + "/booking-modal.js" + cacheBuster;
                  modalScript.setAttribute("data-shop-id", shopId);
                  modalScript.setAttribute("data-theme-color", primaryColor);
                  document.body.appendChild(modalScript);

                  const widgetScript = document.createElement("script");
                  widgetScript.src =
                    widgetUrlPrefix + "/booking-widget.js" + cacheBuster;
                  widgetScript.setAttribute("data-shop-id", shopId);
                  widgetScript.setAttribute("data-theme-color", primaryColor);
                  document.body.appendChild(widgetScript);

                  const reviewScript = document.createElement("script");
                  reviewScript.src =
                    widgetUrlPrefix + "/review-widget.js" + cacheBuster;
                  reviewScript.setAttribute("data-shop-id", shopId);
                  reviewScript.setAttribute("data-theme-color", primaryColor);
                  document.body.appendChild(reviewScript);
                }, 50);
              } catch (e) {
                console.error(e);
              }

              // Render Data
              try {
                document.getElementById("dyn-shop-name").textContent =
                  data.shop.name || "Sport Clips Haircuts";
                document.getElementById("dyn-shop-name-nav").textContent =
                  data.shop.name || "SPORT CLIPS";
                document.getElementById("dyn-shop-desc").textContent =
                  data.shop.description || "It's good to be a guy.";
                document.getElementById("about-loading").style.display = "none";
                document.getElementById("about-content").style.display =
                  "block";
              } catch (e) {}

              try {
                const rawServices = (data.services || []).filter(
                  (s) => s.duration > 0,
                );

                // Deduplicate services by name
                const servicesMap = new Map();
                rawServices.forEach((s) => {
                  if (!servicesMap.has(s.name)) servicesMap.set(s.name, s);
                });
                const services = Array.from(servicesMap.values());

                if (services.length > 0) {
                  document.getElementById("services-list").innerHTML = services
                    .map((s) => {
                      const fallbackImg =
                        "https://images.unsplash.com/photo-1562322140-8baeececf3df?auto=format&fit=crop&w=600&q=80";
                      return `
                <div class="card">
                  <div style="width: 100%; aspect-ratio: 16/9; overflow: hidden; border-radius: 4px; margin-bottom: 15px;">
                    <img src="${s.imageUrl || fallbackImg}" alt="${s.name}" style="width: 100%; height: 100%; object-fit: cover;">
                  </div>
                  <h3 class="card-title">${s.name}</h3>
                  <div class="card-price">$${Number(s.price).toFixed(2)} <span style="font-size: 0.85rem; color: var(--text-main);">/ ${s.duration} MIN</span></div>
                  <p class="card-desc" title="${s.description || ""}"><span style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.8em;">${s.description || "The MVP Experience."}</span></p>
                  <button class="btn b-book" data-id="${s.id}">Check In</button>
                </div>
              `;
                    })
                    .join("");
                  document.querySelectorAll(".b-book").forEach((b) =>
                    b.addEventListener("click", (e) => {
                      if (window.BarberBooking)
                        window.BarberBooking.open(e.target.dataset.id);
                    }),
                  );
                }
                document.getElementById("services-loading").style.display =
                  "none";
                document.getElementById("services-content").style.display =
                  "block";
              } catch (e) {}

              try {
                const rawProducts = data.products || [];

                // Deduplicate products by name
                const productsMap = new Map();
                rawProducts.forEach((p) => {
                  if (!productsMap.has(p.name)) productsMap.set(p.name, p);
                });
                const products = Array.from(productsMap.values());

                if (products.length > 0) {
                  document.getElementById("products-list").innerHTML = products
                    .map((p) => {
                      const fallbackImg =
                        "https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?auto=format&fit=crop&w=600&q=80";
                      return `
                <div class="card" style="background: var(--white);">
                  <div style="width: 100%; aspect-ratio: 1; overflow: hidden; border-radius: 4px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center;">
                    <img src="${p.imageUrl || fallbackImg}" alt="${p.name}" style="width: 100%; height: 100%; object-fit: contain;">
                  </div>
                  <h3 class="card-title">${p.name}</h3>
                  <div class="card-price">$${Number(p.price).toFixed(2)}</div>
                  <p class="card-desc" title="${p.name}${p.description ? "\n\n" + p.description : ""}"><span style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.8em;">${p.description || "Top-tier grooming gear."}</span></p>
                  <div class="card-actions">
                    <button class="btn btn-outline b-view" data-id="${p.id}">Details</button>
                    <button class="btn b-buy" data-id="${p.id}">Buy Now</button>
                  </div>
                </div>
              `;
                    })
                    .join("");
                  document.querySelectorAll(".b-buy").forEach((btn) =>
                    btn.addEventListener("click", (e) => {
                      BarberSaaS.getProductDetails(e.target.dataset.id).then(
                        (p) => alert("Added to cart: 1x " + p.name),
                      );
                    }),
                  );
                  document.querySelectorAll(".b-view").forEach((btn) =>
                    btn.addEventListener("click", (e) => {
                      BarberSaaS.getProductDetails(e.target.dataset.id).then(
                        (p) => {
                          let modal = document.getElementById("product-modal");
                          if (!modal) {
                            modal = document.createElement("div");
                            modal.id = "product-modal";
                            modal.style.cssText =
                              "display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:10001;align-items:center;justify-content:center;";

                            const modalContent = document.createElement("div");
                            modalContent.style.cssText =
                              "background:white;padding:30px;border-radius:8px;max-width:800px;width:90%;position:relative;box-shadow:0 10px 25px rgba(0,0,0,0.2);display:flex;gap:30px;flex-wrap:wrap;";

                            const closeBtn = document.createElement("button");
                            closeBtn.innerHTML = "&times;";
                            closeBtn.style.cssText =
                              "position:absolute;top:15px;right:15px;background:none;border:none;font-size:24px;cursor:pointer;color:#333;z-index:2;";
                            closeBtn.onclick = () =>
                              (modal.style.display = "none");

                            const imageContainer = document.createElement("div");
                            imageContainer.style.cssText = "flex: 1; min-width: 250px; display: flex; align-items: center; justify-content: center; background: var(--light-gray); border-radius: 4px; overflow: hidden;";
                            
                            const img = document.createElement("img");
                            img.id = "product-modal-img";
                            img.style.cssText = "width: 100%; height: auto; object-fit: contain; max-height: 400px;";
                            imageContainer.appendChild(img);

                            const textContainer = document.createElement("div");
                            textContainer.style.cssText = "flex: 1.5; min-width: 250px; display: flex; flex-direction: column;";

                            const title = document.createElement("h2");
                            title.id = "product-modal-title";
                            title.style.cssText =
                              "color:var(--primary,#E31837);margin-top:0;margin-bottom:10px;text-transform:uppercase;font-weight:900;border-bottom:2px solid var(--primary,#E31837);padding-bottom:10px;";

                            const price = document.createElement("div");
                            price.id = "product-modal-price";
                            price.style.cssText =
                              "font-size:1.2rem;font-weight:900;margin-bottom:20px;";

                            const desc = document.createElement("p");
                            desc.id = "product-modal-desc";
                            desc.style.cssText = "color:#555;line-height:1.6;";

                            const buyBtn = document.createElement("button");
                            buyBtn.id = "product-modal-buy";
                            buyBtn.className = "btn b-buy";
                            buyBtn.textContent = "Buy Now";
                            buyBtn.style.cssText = "margin-top: auto; max-width: 200px;";

                            textContainer.appendChild(title);
                            textContainer.appendChild(price);
                            textContainer.appendChild(desc);
                            textContainer.appendChild(buyBtn);

                            modalContent.appendChild(closeBtn);
                            modalContent.appendChild(imageContainer);
                            modalContent.appendChild(textContainer);
                            modal.appendChild(modalContent);
                            document.body.appendChild(modal);

                            modal.addEventListener("click", (e) => {
                              if (e.target === modal)
                                modal.style.display = "none";
                            });
                          }

                          document.getElementById(
                            "product-modal-title",
                          ).textContent = p.name;
                          document.getElementById(
                            "product-modal-price",
                          ).textContent = "$" + Number(p.price).toFixed(2);
                          document.getElementById(
                            "product-modal-desc",
                          ).textContent =
                            p.description || "No description available.";
                          document.getElementById("product-modal-img").src = 
                            p.imageUrl || "https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?auto=format&fit=crop&w=600&q=80";
                          document.getElementById("product-modal-img").alt = p.name;
                          document.getElementById("product-modal-buy").onclick = () => {
                            alert("Added to cart: 1x " + p.name);
                            modal.style.display = "none";
                          };
                          modal.style.display = "flex";
                        },
                      );
                    }),
                  );
                }
                document.getElementById("products-loading").style.display =
                  "none";
                document.getElementById("products-content").style.display =
                  "block";
              } catch (e) {}

              try {
                const reviews = data.reviews || [];
                if (reviews.length > 0) {
                  document.getElementById("reviews-list").innerHTML = reviews
                    .slice(0, 3)
                    .map(
                      (r) => `
                <div class="testimonial">
                  <div class="testimonial-stars">${"★".repeat(r.rating || 5)}</div>
                  <p class="testimonial-quote">${r.comment || "Great experience, highly recommend!"}</p>
                </div>
              `,
                    )
                    .join("");
                }
                document
                  .getElementById("add-review-btn")
                  .addEventListener("click", () => {
                    if (window.BarberReviews) {
                      window.BarberReviews.open(true);
                    } else {
                      const aptId = prompt("Enter Check-In ID:");
                      const rating = prompt("Rating (1-5):", "5");
                      const comment = prompt("Comments:");
                      if (aptId && rating && comment) {
                        BarberSaaS.submitReview({
                          appointmentId: aptId,
                          rating: parseInt(rating),
                          comment,
                        })
                          .then(() => alert("Highlight submitted!"))
                          .catch((e) => alert("Error: " + e.message));
                      }
                    }
                  });
                document.getElementById("reviews-loading").style.display =
                  "none";
                document.getElementById("reviews-content").style.display =
                  "block";
              } catch (e) {}
            })
            .catch((err) => {
              console.error("Public Data Error: ", err);
              document.getElementById("services-loading").textContent =
                "Failed to load data. Please refresh.";
            });
        }

        if (typeof BarberSaaS !== "undefined") initializeShop();
        else {
          let attempts = 0;
          let intv = setInterval(() => {
            attempts++;
            if (typeof BarberSaaS !== "undefined" || attempts >= 50) {
              clearInterval(intv);
              initializeShop();
            }
          }, 100);
        }
      });
    </script>
  </body>
</html>
